<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">3D ICE favicon</title>
  <desc id="desc">A glowing ice cube on a deep blue background.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3159" />
      <stop offset="100%" stop-color="#082a49" />
    </linearGradient>
    <radialGradient id="topGlow" cx="50%" cy="34%" r="48%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="58%" stop-color="#ccfbff" />
      <stop offset="100%" stop-color="#8fe9f3" />
    </radialGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#96dcff" />
      <stop offset="100%" stop-color="#2d82be" />
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7fd7ff" />
      <stop offset="100%" stop-color="#0d4d84" />
    </linearGradient>
    <linearGradient id="iceBand" x1="0%" y1="30%" x2="100%" y2="70%">
      <stop offset="0%" stop-color="#6cf7ff" />
      <stop offset="52%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#7af8ff" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="frontClip">
      <polygon points="100,174 256,264 256,426 100,336" />
      <polygon points="412,174 256,264 256,426 412,336" />
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="56" fill="url(#bg)" />

  <ellipse cx="256" cy="170" rx="112" ry="48" fill="#5ef7ff" opacity="0.22" filter="url(#softGlow)" />

  <g stroke-linejoin="round" stroke-linecap="round">
    <polygon points="256,84 412,174 256,264 100,174" fill="#0a2d58" opacity="0.65" stroke="#08224a" stroke-width="18" />

    <polygon points="100,174 256,264 256,426 100,336" fill="url(#leftFace)" stroke="#0a2851" stroke-width="16" />
    <polygon points="412,174 256,264 256,426 412,336" fill="url(#rightFace)" stroke="#0a2851" stroke-width="16" />
    <polygon points="256,84 412,174 256,264 100,174" fill="url(#topGlow)" stroke="#ffffff" stroke-width="16" filter="url(#softGlow)" />

    <g opacity="0.36">
      <path d="M132 208 L256 280" stroke="#e9ffff" stroke-width="10" />
      <path d="M380 206 L256 280" stroke="#e9ffff" stroke-width="10" />
      <path d="M182 258 L102 336" stroke="#dffcff" stroke-width="8" />
      <path d="M334 252 L410 332" stroke="#dffcff" stroke-width="8" />
    </g>

    <g clip-path="url(#frontClip)">
      <path
        d="M430 255 C362 288 312 322 255 360 C206 392 160 423 111 452"
        stroke="#082b52"
        stroke-width="116"
        opacity="0.9"
      />
      <path
        d="M430 255 C362 288 312 322 255 360 C206 392 160 423 111 452"
        stroke="url(#iceBand)"
        stroke-width="88"
        filter="url(#softGlow)"
      />
      <path
        d="M430 255 C362 288 312 322 255 360 C206 392 160 423 111 452"
        stroke="#ffffff"
        stroke-width="34"
        opacity="0.82"
      />
      <path d="M359 286 C331 304 299 325 262 350" stroke="#75fbff" stroke-width="8" opacity="0.8" />
      <path d="M311 318 C282 338 248 362 216 388" stroke="#75fbff" stroke-width="8" opacity="0.8" />
      <path d="M255 355 C225 376 194 400 162 425" stroke="#75fbff" stroke-width="8" opacity="0.8" />
    </g>

    <path d="M256 84 L256 264 L256 426" stroke="#d8ffff" stroke-width="10" opacity="0.55" />
  </g>
</svg>
