name: release-compat-bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to publish/update as a GitHub Release, for example v0.1.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: release_target
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build compatibility bundle
        run: node scripts/build_compat_bundle.mjs

      - name: Smoke test compatibility bundle
        run: node scripts/smoke_compat_bundle.mjs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3d-ice-compat-${{ steps.release_target.outputs.tag || github.run_id }}
          path: |
            dist/3d-ice-compat.tar.gz
            dist/3d-ice-compat.tar.gz.sha256
            dist/3d-ice-compat-manifest.json

      - name: Publish GitHub release assets
        if: steps.release_target.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_target.outputs.tag }}
          files: |
            dist/3d-ice-compat.tar.gz
            dist/3d-ice-compat.tar.gz.sha256
            dist/3d-ice-compat-manifest.json
