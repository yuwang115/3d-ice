name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov h5py numpy scipy netCDF4

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/e2e -v --tb=short --cov=scripts --cov-report=term-missing

  metadata-validation:
    name: Validate .meta.json files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Validate metadata
        run: pytest tests/test_metadata_schema.py -v --tb=short

  bundle-smoke:
    name: Compatibility bundle smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and smoke test bundle
        run: |
          npm run bundle:compat
          npm run smoke:compat

  e2e-tests:
    name: Browser E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest playwright
          python -m playwright install chromium --with-deps

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short
